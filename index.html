<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CodeWolf Apps</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
background:#0f172a;
color:#e5e7eb;
line-height:1.6;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

header{
text-align:center;
margin-bottom:60px;
}

header img{
width:110px;
margin-bottom:20px;
}

header h1{
font-size:42px;
font-weight:700;
}

header p{
opacity:.7;
margin-top:10px;
}

.apps{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:#1e293b;
border-radius:14px;
padding:25px;
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
}

.card h2{
margin-bottom:10px;
}

.card p{
opacity:.8;
margin-bottom:15px;
}

.button{
display:inline-block;
padding:10px 18px;
border-radius:8px;
background:#38bdf8;
color:#0f172a;
font-weight:600;
text-decoration:none;
}

footer{
margin-top:80px;
text-align:center;
opacity:.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<header>

<img src="logo.png" alt="CodeWolf Logo">

<h1>CodeWolf Apps</h1>

<p>Simple, privacy-focused Android apps.</p>

</header>

<section class="apps">

<div class="card">

<h2>Expense Tracker</h2>

<p>
Offline personal finance tracker with budgets,
goals, reports, and encrypted backups.
</p>

<a class="button"
href="https://play.google.com/store/apps/details?id=com.codewolf.expensetracker">
View on Google Play
</a>

</div>

</section>

<footer>

© 2026 CodeWolf Apps  
Contact: codewolf.apps@gmail.com

</footer>

</div>

</body>
</html>
